<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance - Rafi Abdillah F</title>
    <!-- Fonts from Portfolio -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Portfolio Design Tokens */
        :root {
            --bg: #111110;
            --bg-secondary: #1a1a18;
            --border: #2a2a27;
            --text: #ededea;
            --text-secondary: #8a8a82;
            --accent: #ff4500;
            --accent-soft: rgba(255, 69, 0, 0.12);
            --hero-glow: radial-gradient(circle at top center, rgba(255, 69, 0, 0.15) 0%, transparent 50%);
            --grid-color: rgba(255, 255, 255, 0.03);
            --font-sans: 'Instrument Sans', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Hero Glow exactly like the portfolio */
        .glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background: var(--hero-glow);
            z-index: 0;
            pointer-events: none;
        }

        /* Subtle grid overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: 1;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
            pointer-events: none;
        }

        /* Main content container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 4rem 2rem;
            max-width: 800px;
            width: 100%;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 1s var(--ease) forwards;
        }

        @keyframes fadeUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Matching the .section-label from app.css */
        .section-label { 
            display: inline-flex; 
            align-items: center;
            gap: 10px;
            font-family: var(--font-mono); 
            font-size: 13px; 
            font-weight: 500; 
            color: var(--accent); 
            background: var(--accent-soft);
            padding: 6px 14px;
            border-radius: 100px;
            letter-spacing: 0.5px; 
            margin-bottom: 2rem; 
            border: 1px solid rgba(255, 69, 0, 0.2);
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 69, 0, 0.6); }
            70% { box-shadow: 0 0 0 6px rgba(255, 69, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 69, 0, 0); }
        }

        /* Matching the .section-title from app.css */
        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.04em;
            color: var(--text);
        }

        /* Matching the .section-subtitle from app.css */
        p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 3rem auto;
            font-weight: 400;
        }

        .progress-container {
            width: 100%;
            height: 1px;
            background: var(--border);
            position: relative;
            max-width: 240px;
            margin: 0 auto;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 40%;
            background: var(--accent);
            animation: loading 2s var(--ease) infinite alternate;
        }

        @keyframes loading {
            0% { transform: translateX(-20%); width: 20%; }
            100% { transform: translateX(240px); width: 60%; }
        }

        .contact {
            margin-top: 3.5rem;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .contact a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2px;
            transition: all 0.3s var(--ease);
        }

        .contact a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="grid-overlay"></div>

    <main class="container">
        <div class="section-label">
            <div class="pulse-dot"></div>
            System Update
        </div>
        
        <h1>Enhancing the<br>Experience</h1>
        
        <p>This portfolio is currently undergoing scheduled maintenance to refine the interface and improve performance. I'll be back shortly.</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="contact">
            Need to reach me? <a href="https://www.linkedin.com/in/rafi-abdillah-f-9517a1329/">Visit my LinkedIn</a>
        </div>
    </main>
</body>
</html>
